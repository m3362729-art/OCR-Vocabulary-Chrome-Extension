<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR 單字本 - 設定</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <h1>⚙️ 設定</h1>
    <div class="form-group">
      <label for="api-key">Gemini API Key</label>
      <input type="password" id="api-key" placeholder="輸入你的 Gemini API Key">
    </div>
    <div class="form-group">
      <label for="model-select">Gemini 模型</label>
      <select id="model-select">
        <option value="gemini-2.5-flash">gemini-2.5-flash（推薦）</option>
        <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite（輕量快速）</option>
        <option value="gemini-2.5-pro">gemini-2.5-pro（最強但較慢）</option>
      </select>
    </div>
    <div class="button-group">
      <button id="btn-save">儲存</button>
      <button id="btn-test" class="btn-secondary">測試連線</button>
    </div>
    <p id="status-message"></p>
    <p class="help-text">
      前往 <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a> 取得你的 API Key。
    </p>
  </div>
  <script src="settings.js"></script>
</body>
</html>
